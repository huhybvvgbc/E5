name: Check Microsoft E5 2605

on:
  schedule:
    # 每小时第 3 分钟运行一次
    - cron: '3 */1 * * *'

  workflow_dispatch:

jobs:
  check-expiry:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Check Chrome and ChromeDriver
        run: |
          google-chrome --version || chrome --version || chromium --version
          chromedriver --version
          which google-chrome || true
          which chrome || true
          which chromedriver || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade selenium requests

      - name: Run E5 Expiry Check Script
        env:
          MS_E5_ACCOUNTS: ${{ secrets.MS_E5_ACCOUNTS }}

          # 如果你用 PushPlus，取消下面这一行注释
          # PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}

          # 如果你用 Telegram，取消下面两行注释
          # TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          # TG_USER_ID: ${{ secrets.TG_USER_ID }}

        run: python check_e5_expiry.py

      - name: Upload Debug Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: ./*.png
          if-no-files-found: ignore
